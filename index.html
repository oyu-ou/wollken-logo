
<style>
*{box-sizing:border-box;margin:0;padding:0}

body {
  display: flex;
}
#ww{
  width:100%;height:560px;position:relative;
  font-family:'Alte Haas Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;
  cursor:pointer;overflow:hidden;
    margin: auto;
}
#wph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  gap:22px;
  transition:opacity 0.6s ease, transform 0.6s ease;
  transform: translate(40%, -7%) !important;
}
.tl{display:flex;align-items:baseline;gap:16px;opacity:0;transition:opacity 0.12s ease}
.tl.vis{opacity:1}
.tnum{
  font-size:9px;letter-spacing:0.14em;
  color:#ddd;
  min-width:20px;text-align:right;flex-shrink:0;
  font-variant-numeric:tabular-nums;
  font-size: 15px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.ttxt{
  font-size:15px;letter-spacing:0.04em;
  color:var(--color-text-primary);
  line-height:1;
}
.tcur{
  display:inline-block;width:1.5px;height:13px;
  background:var(--color-text-primary);
  vertical-align:middle;margin-left:2px;
  animation:bl 0.8s step-end infinite;
}
@keyframes bl{50%{opacity:0}}

#wcirc{
  position:absolute;inset:0;opacity:0;
  pointer-events:none;
  transition:opacity 0.8s ease;
}
.cstroke{
  fill:none;stroke:#898989;stroke-width:0.2;
}
.ctxt{
  font-family:'Alte Haas Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:9px;letter-spacing:2.2px;
  fill:#898989;
  opacity:0;transition:opacity 0.8s ease;
}
#whint{
  position:absolute;bottom:14px;right:18px;
  font-size:9px;letter-spacing:0.14em;
  color:var(--color-text-tertiary);
  opacity:0;transition:opacity 0.5s ease;
  text-transform:uppercase;pointer-events:none;
}
svg#wmark {    position: absolute;
    top: 47%;
    right: 50%;
    transform: translate(50%, -50%);
    max-width: 600px;
    width: 60%;
    height: auto;
    transition: 0.5 all ease;}
</style>

<script>
const LINES = [
  'From the Land, Not the Factory',
  'Wool as It Was Meant to Be',
  'Chic Without Noise',
  'Sustainability Is Not a Feature',
  'Small Is the Point',
  'Wear It Softly, Keep It Forever',
];
const CIRCS = [823,804,1119,873,905,905];
const sleep = ms => new Promise(r => setTimeout(r,ms));

async function type(el, txt, spd){
  for(let i=0;i<=txt.length;i++){
    el.textContent = txt.slice(0,i);
    await sleep(spd);
  }
}

function moveToCircles(){
  const POS=[
    [-220,0],
    [220,0],
    [0,-120],
    [140,-170],
    [90,130],
    [-140,150]
  ];

  document.querySelectorAll('.tl').forEach((el,i)=>{
    el.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1)';
    el.style.transform = `translate(${POS[i][0]}px,${POS[i][1]}px) scale(0.65)`;
  });
}

async function run(){
  // reset type phase
  document.querySelectorAll('.tl').forEach(l=>{
    l.classList.remove('vis');
    l.querySelector('.ttxt').textContent='';
    const c=l.querySelector('.tcur');
    if(c){c.style.display='inline-block';}
  });
  const wph=document.getElementById('wph');
  wph.style.transition='none';
  wph.style.opacity='1';
  wph.style.transform='scale(1)';

  // reset circles
  const wc=document.getElementById('wcirc');
  wc.style.transition='none';
  wc.style.opacity='0';
  CIRCS.forEach((_,i)=>{
    const el=document.getElementById('cs'+i);
    el.style.transition='none';
    el.style.strokeDashoffset=CIRCS[i];
  });
  document.querySelectorAll('.ctxt').forEach(t=>{
    t.style.transition='none';
    t.style.opacity='0';
  });
  const wm=document.getElementById('wmark');
  wm.style.transition='none';
  wm.style.opacity='0';
  document.getElementById('whint').style.opacity='0';

  await sleep(300);

  // type each line
  const speeds=[26,26,26,26,26,26];
  const pauses=[180,180,180,180,180,0];
  for(let i=0;i<LINES.length;i++){
    const line=document.getElementById('tl'+i);
    const txt=line.querySelector('.ttxt');
    const cur=line.querySelector('.tcur');
    line.classList.add('vis');
    await type(txt,LINES[i],speeds[i]);
    if(cur)cur.style.display='none';
    await sleep(pauses[i]);
  }

  await sleep(1300);

  // move text into circle positions
  moveToCircles();

  wph.style.transition='opacity 0.55s ease';
  wph.style.opacity='0.5';

  await sleep(650);

  // show circle phase
  wc.style.transition='opacity 0.7s ease';
  wc.style.opacity='1';
  await sleep(100);

  // draw circles staggered
  CIRCS.forEach((_,i)=>{
    const el=document.getElementById('cs'+i);
    setTimeout(()=>{
      el.style.transition=`stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1)`;
      el.style.strokeDashoffset='0';
    }, i*150);
  });

  // wordmark appears last
  setTimeout(()=>{
    wm.style.transition='opacity 3s ease';
    wph.style.transition='opacity 3s ease';
    wm.style.opacity='1';
    wph.style.opacity='0';
    wph.style.opacity='0';
    el.style.opacity='0.5';
  }, 2200);

  // replay hint
  await sleep(4000);
  document.getElementById('whint').style.opacity='1';
}

document.getElementById('ww').addEventListener('click', run);
run();
</script>
